name: salud_tlsk_ai
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#FFF5E1"
  image: assets/logo2.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
  android_12:
    image: assets/logo2.png
    color: "#FFF5E1"
    icon_background_color: "#FFF5E1"

flutter:
  uses-material-design: true
  assets:
    - assets/logo2.png